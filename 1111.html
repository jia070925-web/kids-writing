<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小說閱讀器 - 穩定存檔版</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.8; margin: 0; padding: 20px; background-color: #f4f1ea; color: #333; }
        .controls { position: sticky; top: 0; background: #fff; padding: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px; z-index: 1000; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        button { padding: 8px 12px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 14px; }
        .active { background: #007bff !important; color: white !important; border-color: #007bff; }
        #edit-area { display: none; margin-bottom: 20px; }
        #content-input { width: 100%; height: 450px; padding: 15px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .sync-panel { background: #eef2f7; padding: 15px; border-radius: 5px; font-size: 13px; display: none; width: 100%; border-left: 5px solid #28a745; }
        .article-container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; min-height: 80vh; }
        .article-content { font-size: 20px; white-space: pre-wrap; word-wrap: break-word; }
        .size-m { font-size: 26px; }
        .size-l { font-size: 34px; }
        .status-msg { display: block; margin-top: 10px; font-weight: bold; color: green; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="toggleEdit()" style="background:#28a745; color:white; border:none;">✎ 貼上內容</button>
        <button onclick="toggleSyncPanel()" style="background:#007bff; color:white; border:none;">⇄ 跨裝置同步 (手動碼)</button>
        <div style="margin-left:auto">
            <button onclick="changeSize('s')" id="btn-s" class="active">小</button>
            <button onclick="changeSize('m')" id="btn-m">中</button>
            <button onclick="changeSize('l')" id="btn-l">大</button>
        </div>

        <div id="sync-panel" class="sync-panel">
            <strong>【同步步驟】</strong><br>
            1. 在電腦點「產生並複製存檔碼」 <br>
            2. 透過 LINE 傳給自己 <br>
            3. 在手機貼上代碼點「匯入存檔碼」
            <hr>
            <textarea id="sync-code-area" placeholder="在此貼上同步碼..." style="width:100%; height:80px; margin-top:10px; border-radius:4px; padding:5px;"></textarea>
            <div style="margin-top:10px;">
                <button onclick="generateSyncCode()" style="background:#28a745; color:white; border:none;">↑ 產生並複製存檔碼</button>
                <button onclick="importSyncCode()" style="background:#6f42c1; color:white; border:none;">↓ 匯入存檔碼</button>
                <span id="sync-msg" class="status-msg"></span>
            </div>
        </div>
    </div>

    <div id="edit-area">
        <textarea id="content-input" placeholder="請在這裡全選並貼上小說內容..."></textarea>
        <div style="text-align:center; margin-top:10px;">
            <button onclick="saveLocal()" style="padding:10px 40px; background:#28a745; color:white; border:none; border-radius:5px; font-size:16px;">儲存並閱讀</button>
        </div>
    </div>

    <div class="article-container">
        <div id="display-content" class="article-content">內容讀取中...</div>
    </div>

    <script>
        const display = document.getElementById('display-content');
        const input = document.getElementById('content-input');
        const codeArea = document.getElementById('sync-code-area');
        const msg = document.getElementById('sync-msg');

        // 1. 本地讀寫與調整
        function saveLocal() {
            const text = input.value;
            display.innerText = text;
            localStorage.setItem('novel_text', text);
            document.getElementById('edit-area').style.display = 'none';
            window.scrollTo(0,0);
        }

        function changeSize(s) {
            display.classList.remove('size-m', 'size-l');
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            if(s === 'm') display.classList.add('size-m');
            if(s === 'l') display.classList.add('size-l');
            document.getElementById('btn-' + s).classList.add('active');
            localStorage.setItem('novel_size', s);
        }

        function toggleEdit() {
            const area = document.getElementById('edit-area');
            area.style.display = (area.style.display === 'block') ? 'none' : 'block';
            if(area.style.display === 'block') input.value = display.innerText;
        }

        function toggleSyncPanel() {
            const panel = document.getElementById('sync-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        // 2. 存檔碼功能 (LZ-String 壓縮)
        function generateSyncCode() {
            const text = display.innerText;
            if(!text || text.length < 5) return alert("請先貼上小說內容");
            
            // 壓縮
            const compressed = LZString.compressToEncodedURIComponent(text);
            codeArea.value = compressed;
            
            // 自動複製到剪貼簿
            codeArea.select();
            document.execCommand('copy');
            
            msg.innerText = "✅ 存檔碼已產生並複製！請去 LINE 傳送給自己。";
            msg.style.color = "green";
        }

        function importSyncCode() {
            const code = codeArea.value.trim();
            if(!code) return alert("請貼上存檔碼");

            try {
                // 解壓縮
                const originalText = LZString.decompressFromEncodedURIComponent(code);
                if(originalText) {
                    display.innerText = originalText;
                    input.value = originalText;
                    localStorage.setItem('novel_text', originalText);
                    msg.innerText = "✅ 匯入成功！內容已更新。";
                    msg.style.color = "blue";
                    setTimeout(() => { document.getElementById('sync-panel').style.display = 'none'; }, 1000);
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("存檔碼無效，請確認是否複製完整。");
            }
        }

        window.onload = () => {
            const savedText = localStorage.getItem('novel_text');
            if(savedText) display.innerText = savedText;
            else display.innerText = "歡迎！點擊左上角『貼上內容』開始。";
            
            const savedSize = localStorage.getItem('novel_size') || 's';
            changeSize(savedSize);
        };
    </script>
</body>
</html>
