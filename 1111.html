<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小說閱讀器 - 壓縮同步版</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.8; margin: 0; padding: 20px; background-color: #f4f1ea; color: #333; }
        .controls { position: sticky; top: 0; background: #fff; padding: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px; z-index: 1000; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        button { padding: 8px 12px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 14px; }
        .active { background: #007bff !important; color: white !important; border-color: #007bff; }
        #edit-area { display: none; margin-bottom: 20px; }
        #content-input { width: 100%; height: 450px; padding: 15px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .sync-panel { background: #eef2f7; padding: 10px; border-radius: 5px; font-size: 13px; display: none; width: 100%; border-left: 5px solid #6f42c1; }
        .article-container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; min-height: 80vh; }
        .article-content { font-size: 20px; white-space: pre-wrap; word-wrap: break-word; }
        .size-m { font-size: 26px; }
        .size-l { font-size: 34px; }
        .status-msg { margin-left:10px; font-weight:bold; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="toggleEdit()" style="background:#28a745; color:white; border:none;">✎ 貼上內容</button>
        <button onclick="toggleSyncPanel()">☁ 跨裝置同步 (大容量壓縮版)</button>
        <div style="margin-left:auto">
            <button onclick="changeSize('s')" id="btn-s" class="active">小</button>
            <button onclick="changeSize('m')" id="btn-m">中</button>
            <button onclick="changeSize('l')" id="btn-l">大</button>
        </div>

        <div id="sync-panel" class="sync-panel">
            同步暗號：<input type="text" id="sync-key" placeholder="上傳後會顯示" style="width:250px; text-align:center; padding:5px;">
            <button onclick="pushToCloud()" style="background:#007bff; color:white; border:none;">↑ 上傳內容 (壓縮)</button>
            <button onclick="pullFromCloud()" style="background:#6f42c1; color:white; border:none;">↓ 抓取內容 (解壓縮)</button>
            <span id="sync-msg" class="status-msg"></span>
            <div style="margin-top:5px; color:#666; font-size:11px;">* 提示：上傳後請複製暗號到手機貼上即可抓取。</div>
        </div>
    </div>

    <div id="edit-area">
        <textarea id="content-input" placeholder="請在這裡全選並貼上小說內容..."></textarea>
        <div style="text-align:center; margin-top:10px;">
            <button onclick="saveLocal()" style="padding:10px 40px; background:#28a745; color:white; border:none; border-radius:5px; font-size:16px;">儲存並開始閱讀</button>
        </div>
    </div>

    <div class="article-container">
        <div id="display-content" class="article-content">內容讀取中...</div>
    </div>

    <script>
        const display = document.getElementById('display-content');
        const input = document.getElementById('content-input');
        const syncInput = document.getElementById('sync-key');
        const msg = document.getElementById('sync-msg');

        // 1. 本地功能
        function saveLocal() {
            const text = input.value;
            display.innerText = text;
            localStorage.setItem('novel_text', text);
            document.getElementById('edit-area').style.display = 'none';
            window.scrollTo(0,0);
        }

        function changeSize(s) {
            display.classList.remove('size-m', 'size-l');
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            if(s === 'm') display.classList.add('size-m');
            if(s === 'l') display.classList.add('size-l');
            document.getElementById('btn-' + s).classList.add('active');
            localStorage.setItem('novel_size', s);
        }

        function toggleEdit() {
            const area = document.getElementById('edit-area');
            area.style.display = (area.style.display === 'block') ? 'none' : 'block';
            if(area.style.display === 'block') input.value = display.innerText;
        }

        function toggleSyncPanel() {
            const panel = document.getElementById('sync-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        // 2. 雲端同步 (LZ-String 壓縮 + JsonBlob 大容量)
        async function pushToCloud() {
            const text = display.innerText;
            if(!text || text.length < 5) return alert("請先儲存內容");

            msg.innerText = "⏳ 正在壓縮並上傳...";
            msg.style.color = "blue";

            try {
                // 執行壓縮：將純文字壓縮成一個安全的網址字串
                const compressed = LZString.compressToEncodedURIComponent(text);
                
                const response = await fetch('https://jsonblob.com/api/jsonBlob', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ c_data: compressed })
                });

                if (response.ok) {
                    const blobUrl = response.headers.get('Location');
                    const id = blobUrl.split('/').pop();
                    syncInput.value = id;
                    localStorage.setItem('novel_blob_id', id);
                    msg.innerText = "✅ 上傳成功！請複製暗號。";
                    msg.style.color = "green";
                    syncInput.select();
                }
            } catch (e) {
                msg.innerText = "❌ 上傳失敗：" + e.message;
                msg.style.color = "red";
            }
        }

        async function pullFromCloud() {
            const id = syncInput.value.trim();
            if(!id) return alert("請輸入同步暗號");

            msg.innerText = "⏳ 正在抓取並解壓...";
            msg.style.color = "blue";

            try {
                const res = await fetch(`https://jsonblob.com/api/jsonBlob/${id}`);
                const json = await res.json();
                
                if(json && json.c_data) {
                    // 執行解壓縮：將字串還原回純文字
                    const originalText = LZString.decompressFromEncodedURIComponent(json.c_data);
                    display.innerText = originalText;
                    input.value = originalText;
                    localStorage.setItem('novel_text', originalText);
                    localStorage.setItem('novel_blob_id', id);
                    msg.innerText = "✅ 同步成功！";
                    msg.style.color = "green";
                }
            } catch (e) {
                msg.innerText = "❌ 抓取失敗，請確認暗號。";
                msg.style.color = "red";
            }
        }

        window.onload = () => {
            const savedText = localStorage.getItem('novel_text');
            if(savedText) display.innerText = savedText;
            
            const savedSize = localStorage.getItem('novel_size') || 's';
            changeSize(savedSize);

            const lastId = localStorage.getItem('novel_blob_id');
            if(lastId) syncInput.value = lastId;
        };
    </script>
</body>
</html>
